# DeepSTARR — D3 Transformer (12-block DDiT, ~30M params)

dataset:
  name: deepstarr
  sequence_length: 249
  num_classes: 4
  signal_dim: 2  # Dual-head global label: developmental + housekeeping activity

ngpus: 1
nnodes: 1
tokens: 4

model:
  name: small
  type: ddit
  architecture: transformer
  hidden_size: 768
  cond_dim: 128
  length: 249
  n_blocks: 12
  n_heads: 12
  scale_by_sigma: false
  dropout: 0.1
  class_dropout_prob: 0.1

training:
  batch_size: 256
  accum: 1
  max_epochs: 300
  checkpoint_every_n_epochs: 4
  log_freq: 500
  val_every_n_epochs: 4
  weight: standard
  snapshot_sampling: true
  ema: 0.9999

optim:
  optimizer: AdamW
  lr: 0.0003
  beta1: 0.9
  beta2: 0.999
  eps: 1.0e-08
  weight_decay: 0
  warmup: 2500
  grad_clip: 1.0

graph:
  type: uniform
  file: data
  report_all: false

noise:
  type: geometric
  sigma_min: 0.0001
  sigma_max: 20

sampling:
  steps: 20
  num_samples: 10
  batch_size: 256
  predictor: euler
  noise_removal: true

eval:
  batch_size: 256
  perplexity: false
  perplexity_batch_size: 32

wandb:
  enabled: false
  project: d3-deepstarr
  name: deepstarr-transformer

# Default data + oracle + checkpoint pulled from https://zenodo.org/records/19774653 .
# Override at the CLI (--data-file / --oracle-file / --checkpoint) or set
# data.cache_dir to point at a pre-populated directory. Files cache under cache/ (gitignored).
data:
  zenodo_record: "19774653"
  data_file: data_DeepSTARR.h5
  oracle_model: Oracle_DeepSTARR.ckpt
  checkpoint: D3_Tran_DeepSTARR.ckpt
  cache_dir: cache
