# Zoonomia D3 Transformer config (human-only, unconditional).

dataset:
  name: zoonomia
  sequence_length: 350
  num_classes: 5            # {N, A, C, G, T}
  signal_dim: 0             # unconditional — train.py drops the (class, species) label

ngpus: 1
nnodes: 1
tokens: 5

model:
  name: small
  type: ddit
  architecture: transformer
  hidden_size: 768
  cond_dim: 128
  length: 350               # must equal dataset.sequence_length
  n_blocks: 12
  n_heads: 12
  scale_by_sigma: false
  dropout: 0.1
  class_dropout_prob: 0.1

training:
  batch_size: 256
  accum: 1
  max_epochs: 300
  checkpoint_every_n_epochs: 4
  log_freq: 50              # was 500 — controls PL log_every_n_steps + wandb cadence
  num_workers: 4            # per-rank H5 loader workers (DDP-safe; dataset drops H5 handle on pickle)
  val_every_n_epochs: 4
  weight: standard
  snapshot_sampling: true
  ema: 0.9999

optim:
  optimizer: AdamW
  lr: 0.0003
  beta1: 0.9
  beta2: 0.999
  eps: 1.0e-08
  weight_decay: 0
  warmup: 2500
  grad_clip: 1.0

graph:
  type: uniform
  file: data
  report_all: false

noise:
  type: geometric
  sigma_min: 0.0001
  sigma_max: 20

sampling:
  steps: 20
  num_samples: 10
  batch_size: 256
  predictor: euler
  noise_removal: true

eval:
  batch_size: 256
  perplexity: false
  perplexity_batch_size: 32

wandb:
  enabled: true
  project: d3-dna-ccre
  entity: d3-cshl
  name: zoonomia-transformer
  id: zoonomia-transformer-foundation-001   # stable id → unified run across resume chunks; change for a new training chain

# Cluster-only data (not on Zenodo). Override at construction time via the
# h5_path / bed_path kwargs of ZoonomiaDataset.
data:
  h5_path: /grid/koo/home/shared/d3/data/zoonomia/zoonomia_241.h5
  bed_path: /grid/koo/home/shared/d3/data/zoonomia/GRCh38-cCREs.bed
  species_index: 0
