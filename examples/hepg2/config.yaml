# HepG2 LentIMPRA — D3 Transformer Configuration
# Mirrors K562 config; only paths change for the HepG2 cell line.

dataset:
  name: lentimpra
  sequence_length: 230
  num_classes: 4
  signal_dim: 1

ngpus: 2
nnodes: 1
tokens: 4

# Model — 12-block transformer (~30M params)
model:
  name: small
  type: ddit
  architecture: transformer
  hidden_size: 768
  cond_dim: 128
  length: 230
  n_blocks: 12
  n_heads: 12
  scale_by_sigma: false
  dropout: 0.1
  class_dropout_prob: 0.1

training:
  batch_size: 256
  accum: 1
  max_epochs: 300
  checkpoint_every_n_epochs: 4
  log_freq: 500
  val_every_n_epochs: 4
  weight: standard
  snapshot_sampling: true
  ema: 0.9999

optim:
  optimizer: AdamW
  lr: 0.0003
  beta1: 0.9
  beta2: 0.999
  eps: 1.0e-08
  weight_decay: 0
  warmup: 2500
  grad_clip: 1.0

graph:
  type: uniform
  file: data
  report_all: false

noise:
  type: geometric
  sigma_min: 0.0001
  sigma_max: 20

sampling:
  predictor: euler
  steps: 128
  noise_removal: true

eval:
  batch_size: 256
  perplexity: false
  perplexity_batch_size: 32

wandb:
  enabled: false
  project: d3-lentimpra
  name: hepg2-transformer

paths:
  data_file: /grid/koo/home/asarkar/D3-DNA-Discrete-Diffusion/model_zoo/lentimpra/lenti_MPRA_HepG2_data.h5
  oracle_model: /grid/koo/home/asarkar/D3-DNA-Discrete-Diffusion/model_zoo/lentimpra/oracle_models/best_model_hepg2-epoch=15-val_pearson=0.705.ckpt
