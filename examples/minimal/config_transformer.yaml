# Template — D3 Transformer config for a new dataset.
# Copy this file to a new examples/<your-dataset>/ directory and fill in the
# TODO markers. Compare against examples/k562/config_transformer.yaml for a
# fully populated reference.

dataset:
  name: TODO            # short identifier (e.g. "lentimpra", "deepstarr")
  sequence_length: 0    # TODO: bp length of every sequence in the dataset
  num_classes: 4        # DNA alphabet
  signal_dim: 1         # TODO: dim of the per-sample (or per-position) label

ngpus: 1
nnodes: 1
tokens: 4

model:
  name: small
  type: ddit
  architecture: transformer
  hidden_size: 768
  cond_dim: 128
  length: 0             # TODO: must equal dataset.sequence_length
  n_blocks: 12
  n_heads: 12
  scale_by_sigma: false
  dropout: 0.1
  class_dropout_prob: 0.1

training:
  batch_size: 256
  accum: 1
  max_epochs: 300
  checkpoint_every_n_epochs: 4
  log_freq: 500
  val_every_n_epochs: 4
  weight: standard
  snapshot_sampling: true
  ema: 0.9999
  # Default precision is bf16-mixed for transformers; only override if you have
  # a checkpoint that was trained under a different policy (see promoter for the
  # one fp16 exception in the repo).

optim:
  optimizer: AdamW
  lr: 0.0003
  beta1: 0.9
  beta2: 0.999
  eps: 1.0e-08
  weight_decay: 0
  warmup: 2500
  grad_clip: 1.0

graph:
  type: uniform
  file: data
  report_all: false

noise:
  type: geometric
  sigma_min: 0.0001
  sigma_max: 20

sampling:
  steps: 20
  num_samples: 10
  batch_size: 256
  predictor: euler
  noise_removal: true

eval:
  batch_size: 256
  perplexity: false
  perplexity_batch_size: 32

wandb:
  enabled: false
  project: d3-TODO
  name: TODO-transformer

# Default data + oracle + checkpoint pulled from Zenodo on first run, cached
# under cache/ (gitignored). Override at the CLI with --data-file / --oracle-file
# / --checkpoint, or set data.cache_dir to point at a pre-populated directory.
data:
  zenodo_record: "TODO"   # numeric Zenodo record id, as a string
  data_file: TODO         # filename on Zenodo, e.g. data_MyDataset.h5
  oracle_model: TODO      # filename on Zenodo, e.g. Oracle_MyDataset.ckpt
  checkpoint: TODO        # filename on Zenodo, e.g. D3_Tran_MyDataset.ckpt
  cache_dir: cache
