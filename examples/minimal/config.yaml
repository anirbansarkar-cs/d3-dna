# Minimal config for d3-dna examples
dataset:
  name: minimal_synthetic
  sequence_length: 64
  num_classes: 4
  signal_dim: 1

ngpus: 1
tokens: 4

training:
  batch_size: 32
  accum: 1
  max_epochs: 2
  checkpoint_every_n_epochs: 1
  log_freq: 10
  val_every_n_epochs: 1
  weight: standard
  snapshot_sampling: false
  ema: 0.9999

eval:
  batch_size: 32

graph:
  type: uniform

noise:
  type: geometric
  sigma_min: 0.0001
  sigma_max: 20

sampling:
  predictor: analytic
  steps: 32
  noise_removal: true

optim:
  weight_decay: 0
  optimizer: AdamW
  lr: 0.0003
  beta1: 0.9
  beta2: 0.999
  eps: 1.0e-08
  warmup: 100
  grad_clip: 1.0

model:
  architecture: transformer
  hidden_size: 128
  cond_dim: 64
  n_blocks: 4
  n_heads: 4
  dropout: 0.1
  class_dropout_prob: 0.1
  scale_by_sigma: false

wandb:
  enabled: false        # set true + pip install d3-dna[logging] to enable
  project: my-project
  name: my-run
