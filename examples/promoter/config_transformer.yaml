# Promoter — D3 Transformer (12-block DDiT, ~30M params)

dataset:
  name: promoter
  sequence_length: 1024
  num_classes: 4
  signal_dim: 1

ngpus: 1
nnodes: 1
tokens: 4

model:
  name: small
  type: ddit
  architecture: transformer
  hidden_size: 768
  cond_dim: 128
  length: 1024
  n_blocks: 12
  n_heads: 12
  scale_by_sigma: false
  dropout: 0.1
  class_dropout_prob: 0.1

training:
  batch_size: 128
  accum: 1
  max_epochs: 300
  checkpoint_every_n_epochs: 4
  log_freq: 500
  val_every_n_epochs: 4
  weight: standard
  snapshot_sampling: true
  ema: 0.9999
  # PROMOTER EXCEPTION: override the package default (bf16-mixed for transformers).
  # The Zenodo D3_Tran_Promoter.ckpt was trained / validated under fp16; sampling
  # in bf16 produces materially worse outputs (auroc≈1.0). All other transformer
  # examples should keep the bf16-mixed default. See README "Floating-point precision".
  precision: 16-mixed

optim:
  optimizer: AdamW
  lr: 0.0003
  beta1: 0.9
  beta2: 0.999
  eps: 1.0e-08
  weight_decay: 0
  warmup: 2500
  grad_clip: 1.0

graph:
  type: uniform
  file: data
  report_all: false

noise:
  type: geometric
  sigma_min: 0.0001
  sigma_max: 20

sampling:
  steps: 128
  num_samples: 10
  batch_size: 64
  paired_repeat: 1
  predictor: euler
  noise_removal: true

eval:
  batch_size: 512
  perplexity: false
  perplexity_batch_size: 32

wandb:
  enabled: false
  project: d3-promoter
  name: promoter-transformer

# Default data + oracle pulled from https://zenodo.org/records/19738941 .
# Override at the CLI (--data-file / --oracle-file) or set data.cache_dir to
# point at a pre-populated directory. Files are cached under cache/ (gitignored).
data:
  zenodo_record: "19738941"
  data_file: data_Promoter.npz
  oracle_model: Oracle_Promoter.pth.tar
  checkpoint: D3_Tran_Promoter.ckpt
  # sei_features is NOT on Zenodo — hardcoded cluster path; override with --sei-features.
  sei_features: /grid/koo/home/shared/d3/oracle_weights/promoter/target.sei.names
  cache_dir: cache
